# ══════════════════════════════════════════════════════════════
#  Laragon Nginx Config — Laravel Reverb WebSocket Proxy
#
#  CARA PAKAI:
#  Tambahkan blok "location /app" dan "location /apps" di bawah ini
#  ke dalam file: D:\Laragon\etc\nginx\sites-enabled\laravel-12-phoenix.aruna.conf
#  (atau nama file .conf domain Anda di Laragon)
#
#  Cari bagian "server {" yang handle HTTPS laravel-12-phoenix.aruna
#  lalu tambahkan dua blok location ini di dalamnya.
# ══════════════════════════════════════════════════════════════

# Tambahkan INI ke dalam blok "server { ... }" yang sudah ada di Laragon:

location /app {
    proxy_pass             http://127.0.0.1:9001;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade $http_upgrade;
    proxy_set_header       Connection "Upgrade";
    proxy_set_header       Host $host;
    proxy_set_header       X-Real-IP $remote_addr;
    proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_read_timeout     60s;
    proxy_send_timeout     60s;
}

location /apps {
    proxy_pass             http://127.0.0.1:9001;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade $http_upgrade;
    proxy_set_header       Connection "Upgrade";
    proxy_set_header       Host $host;
    proxy_set_header       X-Real-IP $remote_addr;
    proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_read_timeout     60s;
    proxy_send_timeout     60s;
}
